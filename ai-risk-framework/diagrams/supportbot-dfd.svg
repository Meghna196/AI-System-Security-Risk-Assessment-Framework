<svg viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>
  <text x="490" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">SupportBot v2 — Data Flow Diagram</text>
  <text x="490" y="50" text-anchor="middle" font-size="12" fill="#666666">Meridian Financial — trust boundary: internal AWS environment vs. external customer / vendor</text>

  <!-- Trust boundary box: external -->
  <rect x="20" y="70" width="230" height="90" fill="none" stroke="#999999" stroke-dasharray="6,4"/>
  <text x="135" y="65" text-anchor="middle" font-size="11" fill="#888888">External (customer-controlled)</text>

  <!-- Trust boundary box: vendor -->
  <rect x="600" y="330" width="240" height="100" fill="none" stroke="#999999" stroke-dasharray="6,4"/>
  <text x="720" y="325" text-anchor="middle" font-size="11" fill="#888888">External (third-party vendor)</text>

  <!-- External Entity: Customer Browser -->
  <rect x="40" y="90" width="190" height="50" fill="#eef4fc" stroke="#2c5c9e" stroke-width="1.5"/>
  <text x="135" y="120" text-anchor="middle" font-size="13" fill="#1a1a1a">Customer Browser</text>

  <!-- External Entity: Support Staff -->
  <rect x="750" y="90" width="190" height="50" fill="#eef4fc" stroke="#2c5c9e" stroke-width="1.5"/>
  <text x="845" y="120" text-anchor="middle" font-size="13" fill="#1a1a1a">Support Staff</text>

  <!-- Process: API Gateway -->
  <rect x="40" y="220" width="190" height="60" rx="28" ry="28" fill="#eaf7ee" stroke="#2e7d43" stroke-width="1.5"/>
  <text x="135" y="245" text-anchor="middle" font-size="13" fill="#1a1a1a">API Gateway</text>
  <text x="135" y="262" text-anchor="middle" font-size="10" fill="#555555">(AWS API Gateway — authN)</text>

  <!-- Process: Admin Panel -->
  <rect x="750" y="220" width="190" height="60" rx="28" ry="28" fill="#eaf7ee" stroke="#2e7d43" stroke-width="1.5"/>
  <text x="845" y="245" text-anchor="middle" font-size="13" fill="#1a1a1a">Admin Panel</text>
  <text x="845" y="262" text-anchor="middle" font-size="10" fill="#555555">(internal support tool)</text>

  <!-- Process: RAG Retriever -->
  <rect x="330" y="220" width="220" height="60" rx="28" ry="28" fill="#eaf7ee" stroke="#2e7d43" stroke-width="1.5"/>
  <text x="440" y="245" text-anchor="middle" font-size="13" fill="#1a1a1a">RAG Retriever</text>
  <text x="440" y="262" text-anchor="middle" font-size="10" fill="#555555">(LangChain retrieval service)</text>

  <!-- Process: LLM API (external) -->
  <rect x="620" y="350" width="200" height="60" rx="28" ry="28" fill="#fdf3e7" stroke="#b3691d" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="375" text-anchor="middle" font-size="13" fill="#1a1a1a">LLM API</text>
  <text x="720" y="392" text-anchor="middle" font-size="10" fill="#555555">(GPT-4-class, external vendor)</text>

  <!-- Data Store: Customer Database -->
  <path d="M 320 480 h 220 M 320 530 h 220" stroke="#7a3ca0" stroke-width="1.5" fill="none"/>
  <rect x="320" y="480" width="220" height="50" fill="#f6effa" stroke="none"/>
  <path d="M 320 480 h 220 M 320 530 h 220" stroke="#7a3ca0" stroke-width="1.5" fill="none"/>
  <text x="430" y="510" text-anchor="middle" font-size="13" fill="#1a1a1a">Customer Database</text>

  <!-- Data Store: Audit Logs -->
  <rect x="620" y="560" width="220" height="50" fill="#f6effa" stroke="none"/>
  <path d="M 620 560 h 220 M 620 610 h 220" stroke="#7a3ca0" stroke-width="1.5" fill="none"/>
  <text x="730" y="590" text-anchor="middle" font-size="13" fill="#1a1a1a">Audit Logs (CloudWatch)</text>

  <!-- Flows -->
  <!-- Customer Browser -> API Gateway -->
  <line x1="135" y1="140" x2="135" y2="218" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="145" y="180" font-size="10" fill="#333333">1. user query (HTTPS + JWT)</text>

  <!-- API Gateway -> Customer Browser (response) -->
  <line x1="105" y1="218" x2="105" y2="142" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="10" y="180" font-size="10" fill="#333333">6. bot response</text>

  <!-- API Gateway -> RAG Retriever -->
  <line x1="230" y1="250" x2="328" y2="250" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="235" y="242" font-size="10" fill="#333333">2. authenticated request</text>

  <!-- RAG Retriever -> Customer Database -->
  <line x1="410" y1="280" x2="410" y2="478" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="416" y="380" font-size="10" fill="#333333">3. scoped SQL query</text>

  <!-- Customer Database -> RAG Retriever -->
  <line x1="470" y1="478" x2="470" y2="282" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="476" y="440" font-size="10" fill="#333333">4. customer records</text>

  <!-- RAG Retriever -> LLM API -->
  <line x1="550" y1="270" x2="640" y2="348" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="545" y="310" font-size="10" fill="#333333">5. prompt + retrieved context</text>

  <!-- LLM API -> API Gateway (response, long diagonal) -->
  <line x1="700" y1="348" x2="235" y2="255" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)" stroke-dasharray="2,2"/>
  <text x="480" y="330" font-size="10" fill="#333333">5a. LLM response</text>

  <!-- API Gateway -> Audit Logs -->
  <line x1="150" y1="280" x2="625" y2="575" stroke="#888888" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="250" y="440" font-size="10" fill="#666666">request/response log</text>

  <!-- LLM API -> Audit Logs -->
  <line x1="740" y1="410" x2="735" y2="558" stroke="#888888" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="745" y="490" font-size="10" fill="#666666">prompt/response log</text>

  <!-- Support Staff -> Admin Panel -->
  <line x1="845" y1="140" x2="845" y2="218" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="750" y="180" font-size="10" fill="#333333">staff login</text>

  <!-- Admin Panel -> Customer Database -->
  <line x1="750" y1="265" x2="542" y2="495" stroke="#333333" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="610" y="400" font-size="10" fill="#333333">ticket / account lookup</text>

  <!-- Admin Panel -> Audit Logs -->
  <line x1="850" y1="280" x2="800" y2="558" stroke="#888888" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <text x="855" y="420" font-size="10" fill="#666666">admin action log</text>

  <!-- Legend -->
  <rect x="20" y="640" width="16" height="16" fill="#eef4fc" stroke="#2c5c9e"/>
  <text x="42" y="653" font-size="11" fill="#333333">External Entity</text>
  <rect x="160" y="640" width="16" height="16" rx="6" fill="#eaf7ee" stroke="#2e7d43"/>
  <text x="182" y="653" font-size="11" fill="#333333">Process</text>
  <rect x="260" y="640" width="16" height="16" fill="#f6effa" stroke="#7a3ca0"/>
  <text x="282" y="653" font-size="11" fill="#333333">Data Store</text>
  <rect x="360" y="640" width="16" height="16" fill="#fdf3e7" stroke="#b3691d" stroke-dasharray="4,2"/>
  <text x="382" y="653" font-size="11" fill="#333333">Third-party / trust boundary crossing</text>
</svg>
